name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  sidecar:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: sidecar/go.mod
          cache-dependency-path: sidecar/go.sum
      - name: Build sidecar
        run: bash scripts/build-sidecar.sh
      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v7
        with:
          name: deckhand-sidecar-${{ matrix.os }}
          path: tauri/src-tauri/binaries/deckhand-sidecar*

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run version:check
      - run: bun run --filter @deckhand/app build
      - run: bun run --filter @deckhand/tauri build

  # Full Tauri packaging is environment-heavy; document local:
  #   bun run build:sidecar && bun run --filter @deckhand/tauri tauri:build
  # Produces .dmg/.app on macOS and .deb/AppImage on Linux.
